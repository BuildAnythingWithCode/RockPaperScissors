<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="flex column">
    <h1>Welcome to Rock Paper Scissors!</h1>
    <h2>You will play against the computer. Pick your choice below:</h2>
    <div class="flex row">
      <button type="button" id="rock-btn">ROCK</button>
      <button type="button" id="paper-btn">PAPER</button>
      <button type="button" id="scissors-btn">SCISSORS</button>
    </div>
    <p>Player picked: <span id="player-choice"></span></p>
    <p>Computer picked: <span id="cpu-choice"></span></p>
    <p><span id="winner"></span> wins this round!</p>

    <p>Computer Score: <span id="cpu-score">0</span></p>
    <p>Player Score: <span id="player-score">0</span></p>
    <button type="button" id="reset-btn">Reset</button>
    <script src="script.js"></script>
  </body>
</html>
